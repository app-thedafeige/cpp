<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>车票票3周年庆</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f5f7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #1d1d1f;
        }
        .card {
            background: white;
            width: 85%;
            max-width: 400px;
            padding: 40px 24px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            text-align: center;
        }
        h1 { font-size: 24px; margin-bottom: 12px; }
        .info { font-size: 14px; color: #86868b; line-height: 1.6; margin-bottom: 30px; }
        .badge {
            display: inline-block;
            background: #fff1f0;
            color: #ff4d4f;
            padding: 4px 12px;
            border-radius: 100px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .btn-group { margin-bottom: 20px; }
        .btn {
            display: block;
            background-color: #0071e3;
            color: white;
            text-decoration: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            transition: background 0.3s;
        }
        .btn:active { background-color: #0077ed; }
        .desc { font-size: 12px; color: #86868b; margin-top: 8px; margin-bottom: 20px; }
        
        /* 微信遮罩层 */
        #wechat-mask {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            color: white;
            text-align: right;
            padding: 20px;
            box-sizing: border-box;
        }
        #wechat-mask img { width: 50px; float: right; margin-bottom: 20px; }
        #wechat-mask p { font-size: 18px; text-align: center; margin-top: 60px; line-height: 1.6; clear: both; }
    </style>
</head>
<body>

<div class="card">
    <div class="badge">限时福利</div>
    <h1>车票票3周年庆</h1>
    <div class="info">
        活动时间：2026年3月28日-4月7日<br>
        名额：仅限前500名<br>
        <p style="margin-top:15px; font-size:13px;">点击下方按钮将自动跳转App Store<br>确认后即可享受官方优惠价</p>
    </div>

    <div class="btn-group">
        <a href="https://apps.apple.com/redeem?ctx=offercodes&id=6446212291&code=CPP03" class="btn">标准版永久会员</a>
        <p class="desc">解锁所有功能，适合个人使用</p>
    </div>
</div>

<div id="wechat-mask">
    <img src="https://img.icons8.com/ios/100/ffffff/long-arrow-up.png" alt="arrow">
    <p>由于系统限制<br>请点击右上角选择<br><strong>“用默认浏览器打开”</strong></p>
</div>

<script>
    function isWeChat() {
        var ua = window.navigator.userAgent.toLowerCase();
        return ua.match(/MicroMessenger/i) == 'micromessenger';
    }

    window.onload = function() {
        if (isWeChat()) {
            document.getElementById('wechat-mask').style.display = 'block';
        }
    }
</script>

</body>
</html>
